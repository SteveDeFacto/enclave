# Tinfoil Containers release workflow — GPU flavor (phase 1: build + initiate).
#
# Run this from the Actions tab ("Run workflow") with a version like v0.0.1.
# It builds the supervisor image, pushes it to ghcr.io, GENERATES the root
# tinfoil-config.yml from enclaves/gpu/tinfoil-config.yml (pinning the fresh
# supervisor digest), creates the release tag, then dispatches phase 2
# (tinfoil-release-publish.yml) which measures + attests the pinned image.
#
# WHY the copy: the Tinfoil dashboard has no config-file picker — it always
# reads the DEFAULT path (tinfoil-config.yml at the repo root) from a release
# tag. So the flavor sources live in enclaves/<flavor>/tinfoil-config.yml on
# main (no root config there), and each release workflow materializes its
# flavor at the default path IN THE TAG COMMIT. Point the dashboard at a
# vX.Y.Z tag and it sees the GPU flavor; at a vX.Y.Z-cpu tag, the CPU flavor.
#
# NOTE: the ghcr path is hardcoded LOWERCASE (ghcr.io/stevedefacto/enclave-supervisor). The repo
# could gain mixed casing someday; ${{ github.repository }} would emit that verbatim and
# ghcr / the measurement step want lowercase. Keep this in sync with the
# `image:` line in enclaves/gpu/tinfoil-config.yml.

name: Tinfoil Release

run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: tinfoil-container-release-${{ inputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # checkout + check the tag does not exist
      packages: write   # push the container image
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check if version tag already exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/stevedefacto/enclave-supervisor
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  prepare-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the release tag (with the generated root config)
      actions: write        # dispatch tinfoil-release-publish.yml on the new tag

    steps:
      - name: Checkout source commit
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: true

      - name: Generate root tinfoil-config.yml from the GPU flavor and tag the release
        env:
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -euo pipefail
          # materialize the GPU flavor at the default path the Tinfoil dashboard reads
          cp enclaves/gpu/tinfoil-config.yml tinfoil-config.yml
          # `enclave-supervisor[:@]` cannot match enclave-wasm-manager / enclave-worker / enclave-mps (next
          # char is '-'), so only the supervisor line is repinned; the sidecar
          # pins stay as committed by scripts/release.sh.
          sed -i -E "s#(image: \"ghcr\.io/stevedefacto/enclave-supervisor)[:@][^\"]*\"#\1@${DIGEST}\"#" tinfoil-config.yml
          grep -q "ghcr.io/stevedefacto/enclave-supervisor@${DIGEST}" tinfoil-config.yml \
            || { echo "::error::failed to pin supervisor digest into tinfoil-config.yml"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -f: the root config is deliberately gitignored on main (it only exists
          # in release-tag commits); force it into this tag's commit
          git add -f tinfoil-config.yml
          git commit -m "Release ${VERSION}: root config from enclaves/gpu, supervisor digest pinned"
          git tag "$VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Dispatch the publish workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          gh workflow run tinfoil-release-publish.yml --ref "$VERSION" -f mark-as-latest=true
