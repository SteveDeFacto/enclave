# Test suite - the repo's first test-running CI. Deliberately DISJOINT from
# deploy.yml: its own concurrency group, read-only permissions, no secrets,
# and it is never a deploy gate (deploy.yml keeps shipping site/relay on every
# main push; that is exactly why new surfaces land shippable-inert). It runs
# as the signal: unit (node:test, hermetic - stub RPC + stub Stripe),
# contracts (Foundry unit + fuzz + the PaymentRouter zero-balance invariant),
# and e2e (Playwright: passkeys via the CDP virtual authenticator, the hybrid
# checkout against anvil + a Stripe stub).
name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
      - name: Install dependencies (root + relay)
        run: |
          npm ci --no-audit --no-fund
          (cd relay && npm ci --no-audit --no-fund)
      - name: node --test
        # npm test verbatim but with CI headroom on the per-file timeout:
        # cli.test.mjs runs ~14s here vs ~8s locally, and root package.json
        # is release-triggering so the longer timeout cannot live there
        run: node --test --test-timeout=60000 test/*.test.mjs

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: forge test (unit + fuzz + invariants)
        run: forge test -vv

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1   # anvil for the local chain
      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund
          (cd relay && npm ci --no-audit --no-fund)
          (cd e2e && npm ci --no-audit --no-fund)
      - name: forge build (MockUSDC artifact for the anvil chain)
        run: forge build
      - name: Install chromium
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Playwright
        run: cd e2e && npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
            e2e/.data/
            !e2e/.data/*.pem
          include-hidden-files: true   # .data/ is silently dropped without this
          retention-days: 7
