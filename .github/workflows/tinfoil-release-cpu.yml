# Tinfoil Containers release workflow — CPU-ONLY flavor (phase 1).
#
# Mirrors tinfoil-release.yml but releases the CPU enclave config
# (enclaves/cpu/tinfoil-config.yml: supervisor + wasm-manager, no GPU
# containers). The supervisor image is the SAME build as the GPU flavor — the
# flavor is picked by the measured config (GPU_COUNT=0), not by the image.
#
# The Tinfoil dashboard has no config-file picker — it always reads the DEFAULT
# path (tinfoil-config.yml at the repo root) from a release tag. So this
# workflow COPIES enclaves/cpu/tinfoil-config.yml to the root in the tag
# commit (pinning the fresh supervisor digest), and the dashboard sees the CPU
# flavor simply by being pointed at a -cpu tag. Phase 2
# (tinfoil-release-publish.yml, shared with the GPU flavor) measures that
# default path.
#
# Versions MUST end in "-cpu" (e.g. v1.0.0-cpu) so CPU and GPU tags never
# collide and the flavor is readable off the tag. NOTE: verifiers that check
# against this repo's LATEST release (tinfoil-cli default) see the GPU
# measurement — point them at the matching -cpu release explicitly.

name: Tinfoil Release (CPU)

run-name: Release ${{ inputs.version }} (CPU flavor)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CPU flavor version to release (must end in -cpu, e.g. v1.0.0-cpu)'
        required: true
        type: string

concurrency:
  group: tinfoil-container-release-${{ inputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # checkout + check the tag does not exist
      packages: write   # push the container image
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Validate version and check the tag does not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ -cpu$ ]]; then
            echo "::error::CPU flavor versions must end in -cpu (got: $VERSION)"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/enclavehost/enclave-supervisor:${{ inputs.version }}

  prepare-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the pinned-config commit + release tag
      actions: write        # dispatch tinfoil-release-publish-cpu.yml on the new tag

    steps:
      - name: Checkout source commit
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: true

      - name: Generate root tinfoil-config.yml from the CPU flavor and tag the release
        env:
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -euo pipefail
          # materialize the CPU flavor at the default path the Tinfoil dashboard reads
          cp enclaves/cpu/tinfoil-config.yml tinfoil-config.yml
          # `enclave-supervisor[:@]` cannot match enclave-wasm-manager (next char is '-'), so only
          # the supervisor line is repinned; the wasm-manager pin stays as committed.
          sed -i -E "s#(image: \"ghcr\.io/enclavehost/enclave-supervisor)[:@][^\"]*\"#\1@${DIGEST}\"#" tinfoil-config.yml
          grep -q "ghcr.io/enclavehost/enclave-supervisor@${DIGEST}" tinfoil-config.yml \
            || { echo "::error::failed to pin supervisor digest into tinfoil-config.yml"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -f: the root config is deliberately gitignored on main (it only exists
          # in release-tag commits); force it into this tag's commit
          git add -f tinfoil-config.yml
          git commit -m "Release ${VERSION}: root config from enclaves/cpu, supervisor digest pinned"
          git tag "$VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Dispatch the publish workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          # never mark CPU releases "latest": default verification against this
          # repo resolves to the GPU flavor's latest release.
          gh workflow run tinfoil-release-publish.yml --ref "$VERSION" -f mark-as-latest=false
