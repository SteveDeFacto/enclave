# Builds + pushes the enclave-vllm image (the platform-model inference tier) and
# prints the digest to pin into enclaves/gpu8/tinfoil-config.yml.
#
# Manual: run after changing vllm/Dockerfile or vllm/entrypoint.sh (or to move
# the vLLM base version). Then pin the printed digest:
#   sed -i 's#enclave-vllm@sha256:[0-9a-f]*#enclave-vllm@<DIGEST>#' enclaves/gpu8/tinfoil-config.yml
# commit it, and cut the -gpu8 release (tinfoil-release-gpu8.yml).
#
# NOTE: the image is large (FROM vllm/vllm-openai:glm52-cu129, ~10GB+); the
# build mostly pulls the base + adds our thin entrypoint layer.
name: vLLM Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (digest is what gets pinned)"
        required: false
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk (the vLLM base image is large)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/.ghcup /usr/share/swift || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push enclave-vllm
        id: build
        uses: docker/build-push-action@v6
        with:
          context: vllm
          file: vllm/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/enclavehost/enclave-vllm:${{ inputs.tag }}

      - name: Print the digest to pin
        run: |
          echo "enclave-vllm digest: ${{ steps.build.outputs.digest }}"
          echo "Pin it in enclaves/gpu8/tinfoil-config.yml:"
          echo "  ghcr.io/enclavehost/enclave-vllm@${{ steps.build.outputs.digest }}"
          echo "Then confirm the package is PUBLIC (ghcr Settings) so Tinfoil can pull it."
