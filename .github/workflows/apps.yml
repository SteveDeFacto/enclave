# Rebuilds the in-tree wasm apps whose artifacts are too large for git and
# ship as release assets instead (currently: llm-chat, 123MB - a whole LLM is
# baked into the component). Manual: run it after changing the app source;
# the upload lands on the given release tag. The artifact is NOT part of any
# image - download it from the release and publish it to the on-chain app
# catalog (Apps tab) like any other app.
name: Wasm Apps

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload llm_chat.wasm to (created if missing)"
        required: true
        default: "llm-chat-v0.1.0"

jobs:
  llm-chat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: wasm/apps/llm-chat
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component

      - name: Fetch model (pinned revision + sha256)
        run: ./fetch-model.sh

      - name: Build component
        run: cargo component build --release --target wasm32-wasip2

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          sha256sum target/wasm32-wasip2/release/llm_chat.wasm
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "$TAG (app artifact)" \
                 --notes "Prebuilt llm-chat component; see wasm/apps/llm-chat/ for source."
          gh release upload "$TAG" target/wasm32-wasip2/release/llm_chat.wasm \
            --repo "$GITHUB_REPOSITORY" --clobber
          echo "Pin in wasm/Dockerfile.wasm:"
          echo "  LLM_CHAT_URL=https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/llm_chat.wasm"
          echo "  LLM_CHAT_SHA256=$(sha256sum target/wasm32-wasip2/release/llm_chat.wasm | cut -d' ' -f1)"
