<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>llm-chat - Qwen2.5 on Enclave</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131722; --border: #232a3a;
    --text: #e6e9f0; --dim: #8a93a6; --accent: #5eead4; --user: #1e2a45;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 12.5px; }
  #log { flex: 1; overflow-y: auto; padding: 18px; }
  .msg { max-width: 720px; margin: 0 auto 14px; padding: 10px 14px; border-radius: 10px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: var(--user); border: 1px solid var(--border); margin-left: auto; margin-right: 0; max-width: 560px; }
  .msg.assistant { background: var(--panel); border: 1px solid var(--border); }
  .msg .meta { display: block; margin-top: 8px; color: var(--dim); font-size: 11.5px; }
  .msg.err { border-color: #7f3541; background: #2a161b; color: #f2b8c0; }
  .msg.statusline { color: var(--dim); font-style: italic; }
  .notice { max-width: 720px; margin: 0 auto 14px; color: #eab308; font-size: 12.5px; }
  .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  form {
    display: flex; gap: 10px; padding: 14px 18px 16px; border-top: 1px solid var(--border);
    max-width: 760px; margin: 0 auto; width: 100%;
  }
  textarea {
    flex: 1; resize: none; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font: inherit; height: 66px; outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    background: var(--accent); color: #06251f; border: 0; border-radius: 10px;
    padding: 0 22px; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .45; cursor: default; }
  .controls { display: flex; gap: 14px; align-items: center; margin-left: auto; color: var(--dim); font-size: 12.5px; }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 6px; font-size: 12.5px;
  }
  .disclaimer { text-align: center; color: var(--dim); font-size: 11.5px; padding: 0 18px 10px; }
</style>
</head>
<body>
<header>
  <h1>llm-chat</h1>
  <span class="sub">Qwen2.5-0.5B-Instruct (ONNX q4, fp32 activations) via wasi-nn, inside a confidential wasm sandbox</span>
  <span class="controls">
    target <select id="target"><option value="auto">auto (gpu &#8594; cpu)</option><option value="gpu">gpu</option><option value="cpu">cpu</option></select>
  </span>
</header>
<div id="log"></div>
<form id="f">
  <textarea id="in" placeholder="Say something... (Enter to send, Shift+Enter for a new line)" autofocus></textarea>
  <button id="send" type="submit">Send</button>
</form>
<div class="disclaimer">135M parameters: tiny, quick and frequently wrong. This demo proves the platform's GPU inference path, not model intelligence. Chat history stays in this browser tab.</div>
<script>
"use strict";
const log = document.getElementById("log");
const form = document.getElementById("f");
const input = document.getElementById("in");
const send = document.getElementById("send");
const targetSel = document.getElementById("target");
const messages = [];

function add(cls, text) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

async function chat(text) {
  messages.push({ role: "user", content: text });
  add("user", text);
  const div = add("assistant", "");
  div.classList.add("cursor");
  send.disabled = true;
  let reply = "", meta = null, errored = false, sawDone = false;
  // An instance that dies mid-generation leaves the proxied stream OPEN but
  // silent until an upstream idle timeout minutes later - without a watchdog
  // the input stays locked and the chat looks frozen. 75s of total silence is
  // abnormal: status events cover session init and every decoded token sends
  // bytes; the longest legitimate mute stretch is a big CPU prefill.
  const ctl = new AbortController();
  let stallTimer = null;
  const armStall = () => {
    clearTimeout(stallTimer);
    stallTimer = setTimeout(() => ctl.abort(
      new Error("no data for 75s - the instance may have died mid-response; try again")), 75000);
  };
  try {
    armStall();
    const res = await fetch("chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ messages, target: targetSel.value }),
      signal: ctl.signal,
    });
    if (!res.ok || !res.body) {
      let e = "HTTP " + res.status;
      try { e = (await res.json()).error || e; } catch (_) {}
      throw new Error(e);
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for (;;) {
      const { done, value } = await reader.read();
      armStall();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const ev = buf.slice(0, i); buf = buf.slice(i + 2);
        for (const line of ev.split("\n")) {
          if (!line.startsWith("data: ")) continue;
          const d = JSON.parse(line.slice(6));
          if (d.delta !== undefined) {
            div.classList.remove("statusline");
            reply += d.delta;
            div.textContent = reply;
            log.scrollTop = log.scrollHeight;
          } else if (d.status) {
            div.classList.add("statusline");
            div.textContent = d.status;
            log.scrollTop = log.scrollHeight;
          } else if (d.notice) {
            const n = document.createElement("div");
            n.className = "notice"; n.textContent = d.notice;
            log.insertBefore(n, div);
            reply = ""; div.textContent = "";
          } else if (d.done) {
            meta = d; sawDone = true;
          } else if (d.error) {
            throw new Error(d.error);
          }
        }
      }
    }
    // a stream that closes without the done event was cut mid-response (the
    // instance died or restarted) - surface it instead of recording a
    // truncated reply as if it were complete
    if (!sawDone) throw new Error("the stream ended before the response finished - the instance likely restarted; try again");
  } catch (e) {
    errored = true;
    div.classList.remove("cursor");
    div.classList.remove("statusline");
    div.classList.add("err");
    div.textContent = (reply ? reply + "\n\n" : "") + "error: " + e.message;
    messages.pop(); // let the user retry the same question
  }
  clearTimeout(stallTimer);
  div.classList.remove("cursor");
  if (!errored) {
    if (div.classList.contains("statusline")) { div.classList.remove("statusline"); div.textContent = reply; }
    messages.push({ role: "assistant", content: reply });
    if (meta) {
      const m = document.createElement("span");
      m.className = "meta";
      m.textContent = meta.target + " · " + meta.tokens + " tokens · " +
        meta.tok_per_s + " tok/s · load " + meta.load_ms + "ms · prefill " +
        meta.prefill_ms + "ms";
      div.appendChild(m);
    }
  }
  send.disabled = false;
  input.focus();
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || send.disabled) return;
  input.value = "";
  chat(text);
});
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});
</script>
</body>
</html>
