<div class="flow">
  <div class="steps" role="tablist" aria-label="Lifecycle steps">
    <button class="step active" type="button" role="tab" id="flow-tab-1" aria-selected="true" tabindex="0" aria-controls="flow-detail"><span class="num">1</span><div><div class="st-t">Sign in with your wallet</div><div class="st-d">Prove control of your address, with no email and no password.</div></div></button>
    <button class="step" type="button" role="tab" id="flow-tab-2" aria-selected="false" tabindex="-1" aria-controls="flow-detail"><span class="num">2</span><div><div class="st-t">Create a deployment</div><div class="st-d">One create() tx on EnclaveDeployments from your wallet: the app's catalog reference + two shares in 1/1000ths (the app's specs set the minimums). You own the on-chain record; it survives enclave updates.</div></div></button>
    <button class="step" type="button" role="tab" id="flow-tab-3" aria-selected="false" tabindex="-1" aria-controls="flow-detail"><span class="num">3</span><div><div class="st-t">Fund runtime</div><div class="st-d">fundWithAuthorization (EIP-3009 USDC) or fundEth on EnclaveDeployments credits the deployment's runtime balance - the funds themselves forward straight to Enclave in the same tx, and payments are final. Enclaves claim funded work and serve it under leases; fund small, top up any time.</div></div></button>
    <button class="step" type="button" role="tab" id="flow-tab-4" aria-selected="false" tabindex="-1" aria-controls="flow-detail"><span class="num">4</span><div><div class="st-t">Verify the enclave</div><div class="st-d">Pull the CPU attestation + GPU report and check them yourself.</div></div></button>
    <button class="step" type="button" role="tab" id="flow-tab-5" aria-selected="false" tabindex="-1" aria-controls="flow-detail"><span class="num">5</span><div><div class="st-t">Stop (or let it expire)</div><div class="st-d">Tear down and release the share. Unspent runtime stays on the on-chain record - reactivate to use it - but is never withdrawable, which is why you fund in small top-ups.</div></div></button>
  </div>
  <div class="flow-detail" id="flow-detail" role="tabpanel" aria-labelledby="flow-tab-1" tabindex="0"></div>
</div>
