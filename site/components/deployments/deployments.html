<div class="enclaves">
  <!-- the store's toolbar grammar: seg filter · search · count · refresh · primary CTA -->
  <div class="store-toolbar enc-toolbar" hidden>
    <div class="seg enc-segs" role="group" aria-label="Filter deployments by status">
      <button data-bucket="all" class="on" type="button">All <b></b></button>
      <button data-bucket="running" type="button">Running <b></b></button>
      <button data-bucket="queued" type="button">Queued <b></b></button>
      <button data-bucket="ended" type="button">Ended <b></b></button>
      <button data-bucket="failed" type="button">Failed <b></b></button>
    </div>
    <input type="text" class="enc-search" placeholder="search app, id, status…" spellcheck="false" autocapitalize="off" autocomplete="off" aria-label="Search deployments" />
    <button class="btn btn-sm enc-refresh" type="button">↻ refresh</button>
    <a class="btn btn-primary btn-sm" href="apps">+ Deploy app</a>
  </div>
  <!-- one strip per deploy that's streaming (or resumed after a reload) and has no row yet -->
  <div class="enc-lives"></div>
  <div class="enc-body"></div>
  <!-- pagination: the list can grow unbounded, so show 5 rows per page -->
  <div class="enc-pager" hidden></div>
</div>
