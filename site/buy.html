<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- OVERRIDES the edge's blanket `referrer-policy: no-referrer` for THIS
     document (meta beats header). Stripe's onramp controller iframe is
     session-bound and verifies the embedding origin via the Referer; with
     no-referrer the request carries neither Referer nor Origin and
     js.stripe.com 403s the controller - the checkout then dies at submit
     with Stripe's "User is not authenticated". strict-origin-when-cross-origin
     (the browser default) sends exactly the origin, nothing more. -->
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<!-- Load Stripe's current onramp loader from their CDN BEFORE Privy's SDK runs.
     Privy bundles @stripe/crypto, whose loader can go stale against Stripe's
     current CDN scripts: the bundled loader injects a crypto-onramp module whose
     controller then loads SAME-ORIGIN (enclave.host) instead of js.stripe.com and
     404s on its own chunks. Stripe's crypto-onramp-outer.js sets
     window.StripeOnramp to the current, working constructor; Privy's bundled
     loadStripeOnramp reuses an existing window.StripeOnramp
     (`if(window.StripeOnramp) return it`) instead of injecting its own module, so
     with this tag the loader reuses the CDN version and makes zero same-origin
     requests. Must load from Stripe's domain (never bundled/self-hosted) per PCI
     and to stay in sync with Stripe's controller. If it fails to load, the flow
     falls back to Privy's path. Stripe.js (v3) MUST load alongside it - the onramp
     SDK requires window.Stripe ("Please include StripeJS alongside Stripe Crypto
     Onramp"); both are reused by Privy's loader via window.Stripe /
     window.StripeOnramp presence checks. -->
<script src="https://js.stripe.com/v3/"></script>
<script src="https://crypto-js.stripe.com/crypto-onramp-outer.js"></script>
<title>Buy USDC · Enclave</title>
<!-- a session-bound checkout popup, useless as a landing page - keep it out
     of the index (the descriptions below only serve link previews) -->
<meta name="robots" content="noindex" />
<meta name="description" content="Buy USDC on Base with a card, straight into your wallet — the Stripe-powered on-ramp Enclave deployments are funded with. Opened from the deploy console or dashboard." />

<link rel="icon" href="assets/icon.svg" type="image/svg+xml" />

<style>
  html,body{margin:0;height:100%;background:#070B10;color:#E8F4EF;font:15px/1.5 system-ui,sans-serif;}
  #msg{display:flex;height:100%;align-items:center;justify-content:center;text-align:center;padding:24px;color:#8FA6B2;}
  #msg b{color:#E8F4EF;}
  a{color:#2FE6A8;}
  /* The popup IS the checkout: Privy styles its dialog as a floating card
     sized for overlaying a full page, so in this small window it overflows
     and crops top/bottom. Stretch the card to the viewport, scroll inside,
     and drop the card chrome (there's no page behind it). The centering
     wrapper loses its padding too, or the card can't reach the edges. */
  [role="dialog"]{
    width:100% !important; max-width:100% !important;

  *:has(> [role="dialog"]){ padding:0 !important; }
</style>

<body>
<div id="root"></div>
<div id="msg">Loading checkout…</div>
<!-- popover=manual: showPopover() lifts the host into the browser TOP LAYER,
     which paints above ANY z-index/DOM-order combination - Privy re-mounts
     its maxed-z-index portal on every screen change, so no ordering trick
     holds. The inline style neutralizes the popover UA sheet (inset/margin/
     border/background), incl. display:flex overriding its display:none -
     harmless: the host is transparent and pointer-events:none when empty. -->
<div id="toasts" popover="manual" style="position:fixed;top:10px;left:10px;right:10px;bottom:auto;margin:0;border:0;padding:0;width:auto;height:auto;background:transparent;overflow:visible;z-index:2147483647;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>
<script type="module">
/* Buy USDC · runs Privy's FIAT ONRAMP (useFiatOnramp - the Stripe Crypto
   Onramp surface: Stripe/Link checkout in the US+EU, Privy's aggregator
   elsewhere; needs react-auth >=3.33.1 with @stripe/crypto in the bundle -
   see scripts/build-privy.mjs) in a popup. Same origin as the console, so it
   inherits the Privy session the user already has. The main page stays
   framework-free; React lives only here. The Stripe onramp is the ONLY
   checkout: no useFundWallet fallback, no Coinbase/MoonPay, no deposit-address
   screen - a failure surfaces its error and stops. (Privy's legacy fiat onramp
   stays retired; this is its replacement, not a revival.) */

/* Readable error surfacing: Privy's modal swallows provider errors behind a
   generic screen. Tap failing API calls, extract the human message from the
   JSON body, and show it as a red toast ON TOP of the modal. Toasts stay
   until dismissed (✕ / click) - they're the only explanation of a dead
   checkout, so they must outlive it. Full raw detail still goes to the
   console as [buy-diag].
   Stacking (the hard-won rules): a NATIVE dialog.showModal() makes the rest
   of the document INERT and outranks popovers in the top layer, so a
   body-mounted host loses no matter its z-index or promotion order. The one
   escape is being INSIDE the open dialog. surfaceToasts() therefore parents
   the host into the current modal dialog when one exists (body otherwise,
   also rescuing it before a closing dialog would destroy it), re-appends to
   win same-z DOM-order ties, and re-promotes the popover; a 1s watchdog
   re-asserts all of it across Privy's screen-change remounts. Verified
   headless: toast wins elementFromPoint over an open full-screen showModal
   dialog, including after the dialog closes and reopens. */
const recentToasts = new Map();
const toastHost = document.getElementById("toasts");   // module ref: survives detachment
function surfaceToasts(){
  if (!toastHost.children.length) return;
  const modal = document.querySelector("dialog:modal, dialog[open], [role=dialog]");
  const target = (modal && modal.isConnected) ? modal : document.body;
  try { if (toastHost.matches(":popover-open")) toastHost.hidePopover(); } catch(_){}
  target.appendChild(toastHost);
  try { if (toastHost.showPopover) toastHost.showPopover(); } catch(_){}
}
setInterval(surfaceToasts, 1000);
function errToast(text){
  const now = Date.now();
  for (const [k, t] of recentToasts) if (now - t > 12000) recentToasts.delete(k);
  const dup = [...toastHost.children].some(el => el._text === text);
  if (dup || recentToasts.has(text) || toastHost.children.length >= 3) return;   // no dupes, no spam
  recentToasts.set(text, now);
  const el = document.createElement("div");
  el._text = text;
  el.style.cssText = "pointer-events:auto;background:#2a1113;border:1px solid #ff6b6b;color:#ffb3b3;" +
    "border-radius:10px;padding:10px 12px;font:12.5px/1.5 system-ui,sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.5);" +
    "cursor:pointer;display:flex;gap:10px;align-items:flex-start;";
  const body = document.createElement("span");
  body.textContent = text;
  body.style.flex = "1 1 auto";
  const x = document.createElement("span");
  x.textContent = "✕";
  x.style.cssText = "flex:0 0 auto;color:#ff8f8f;font-weight:700;";
  el.append(body, x);
  el.title = "click to dismiss";
  el.onclick = () => el.remove();
  toastHost.appendChild(el);
  surfaceToasts();
}
function humanApiError(status, body){
  try {
    const j = JSON.parse(body);
    const m = (j.error && (j.error.message || j.error)) || j.message || j.detail || body;
    return String(typeof m === "string" ? m : JSON.stringify(m)).slice(0, 180);
  } catch(_){ return String(body).slice(0, 180); }
}
/* Clicking the dark backdrop must NOT dismiss checkout - people click the
   window just to focus it. Two lines of defense:
   1) swallow pointer events that land outside Privy's dialog panel (capture
      on window, registered before Privy loads, so we run first);
   2) if a dismiss slips through anyway (markup we don't recognize, or Privy
      wins the listener race), the cancel handlers below see the fresh
      backdrop click and REOPEN the checkout instead of closing the window.
   The dialog's own ✕ button is a real button - not counted as backdrop -
   so deliberate closes still close. */
let lastBackdropClick = 0;
["pointerdown", "pointerup", "mousedown", "mouseup", "click", "touchstart", "touchend"].forEach(t =>
  window.addEventListener(t, (e) => {
    if (e.target.closest && e.target.closest("#toasts")) return;   // keep toasts dismissible
    /* The dismiss boundary is the PANEL, not [role=dialog]: Privy's modal is
       a Headless UI Dialog whose role=dialog wrapper CONTAINS the backdrop
       (#privy-dialog-backdrop, aria-hidden) and a full-screen centering
       layer - so "inside the dialog element" was still the dark area, and
       Headless UI's own outside-click closer fired. Everything outside
       #privy-modal-content is backdrop. Interactive elements are never
       swallowed (dropdown portals, iframes). */
    const panel = document.querySelector("#privy-modal-content")
               || document.querySelector('dialog:modal, dialog[open], [role="dialog"]');
    const interactive = e.target.closest &&
      e.target.closest("button,a,input,select,textarea,iframe,[role=button],[role=option],[role=listbox],[role=menuitem]");
    if (panel){
      if ((e.target === panel || !panel.contains(e.target)) && !interactive){
        lastBackdropClick = Date.now();
        e.stopPropagation(); e.preventDefault();
      }
    } else if (!interactive){
      // no modal we recognize: don't swallow (unknown UI), but remember
      // inert-area clicks so a dismiss right after reads as accidental
      lastBackdropClick = Date.now();
    }
  }, true));

/* Broken-controller detector. If Stripe's crypto-onramp controller loads as a
   SAME-ORIGIN frame on enclave.host instead of js.stripe.com, it 404s on its
   own chunks (GET enclave.host/crypto-onramp/v1/*.js) and the postMessage
   handshake fails. Root cause is the Privy-bundled @stripe/crypto loader going
   out of sync with Stripe's current CDN onramp scripts (what Stripe's docs warn
   bundling can cause) - nothing the user can do. Catch the fingerprint and say
   so honestly instead of blaming them or dead-ending. */
let blockedFrameShown = false;
function blockedFrameHelp(){
  if (blockedFrameShown) return; blockedFrameShown = true;
  console.warn("[buy-diag] BROKEN-CONTROLLER signature - Stripe's onramp controller loaded same-origin (enclave.host), a known Privy/Stripe embedded-onramp issue");
  errToast("Card checkout is temporarily unavailable (payment-provider issue).");
  msg("Card checkout is temporarily unavailable.<br/><br/>" +
      "This is a known issue on the payment provider’s side, not your browser or your account - we’re on it.<br/><br/>" +
      "Please try again later, or reach out and we’ll help you top up another way.");
}
window.addEventListener("error", (e) => {
  const t = e && e.target;
  if (t && (t.tagName === "SCRIPT" || t.tagName === "IFRAME")){
    const src = String(t.src || "");
    if (/\/crypto-onramp\//.test(src) && src.indexOf(location.origin) === 0) blockedFrameHelp();
  }
}, true);

/* Stale-Link-session recovery. Privy keeps the user's saved onramp cards
   server-side (GET /onramp/stripe/customer/payment_tokens) and, when any
   exist, jumps straight to its saved-card screens - which drive Stripe RPCs
   (getPlatformSettings / createPaymentToken) that REQUIRE the Link consumer
   session stored in the browser to still be 1FA-authenticated. Link sessions
   expire on their own schedule, and Stripe's handler for these calls throws a
   raw "User is not authenticated" with NO re-auth fallback - the checkout
   dies before (or at submit of) a card the user can see. The fresh-user path
   never breaks: with no saved tokens Privy routes through Link's own
   email+OTP screens, which mint a fresh consumer session. So on that exact
   rejection, retry ONCE with the saved-token list suppressed (the bundle
   treats an empty list as "no saved cards"): the user re-authenticates Link
   and still gets their saved cards back - Link keeps them server-side. */
let suppressSavedTokens = false;
let linkAuthRetried = false;
let staleLinkSeen = false;
/* Second recovery stage (the token suppression alone proved insufficient
   live, 2026-07-12): Privy routes the WHOLE flow on the crypto-customer
   lookup - GET /onramp/stripe/customer status "active"+verified enters the
   returning-customer flow (nn()), which needs the stored Link consumer
   session and raw-throws when it's stale; only a non-"active" status routes
   to "choose-email", the Link re-auth path that mints a fresh session (and
   that path handles existing Link accounts fine - that's just Link login on
   a new device). So on failure, present the user as a fresh customer for
   EXACTLY ONE lookup. One-shot is load-bearing: right after OTP re-auth the
   flow re-fetches the customer and throws "Session unexpectedly inactive"
   unless it sees the real "active" - so only the next read may lie. */
let freshCustomerSpoofs = 0;
let autoRetries = 0;
/* Third stage (Steven, 2026-07-12 live): the relink itself works, but the
   CONTINUATION after an in-place re-auth is unreliable - the flow context
   was initialized from the spoofed "none" lookup (no cryptoCustomerId, no
   kyc fields), so the post-OTP screens error out. Once Link is freshly
   authenticated the right state is a clean page: reload, and the native
   returning-customer flow works end to end against the new credentials.
   Detect completion by the post-auth exchange_tokens call (preempts the
   broken continuation) with any later [FiatOnramp:Stripe] error as the
   fallback trigger; capped via sessionStorage so it can never loop. */
let linkReauthStarted = false;
function reloadAfterRelink(){
  let n = 0;
  try { n = +sessionStorage.getItem("buyRelinkReloads") || 0; } catch(_){}
  if (n >= 2){ console.warn("[buy-diag] relink reload cap reached - staying on this page"); return; }
  try { sessionStorage.setItem("buyRelinkReloads", String(n + 1)); } catch(_){}
  console.warn("[buy-diag] Link re-auth finished - reloading for a clean checkout flow");
  errToast("Link reconnected - reloading checkout…");
  msg("Link reconnected - restarting checkout…");
  setTimeout(() => location.reload(), 700);
}
/* Detection is two-pronged because Privy rewrites some rejections (its init
   catch replaces the cause with a generic "Something went wrong setting up
   checkout") - but it always console.error()s the RAW error under the
   "[FiatOnramp:Stripe]" prefix first. Tap that as the reliable signal; the
   rejection-message regex below stays as the fallback for paths that keep
   the original message. */
/* Privy's provider-error screen keeps the fund() promise PENDING ("Something
   went wrong" + Try again/Close) - the rejection only fires when the user
   closes it. So recovery starts from the console signal itself: flip the
   suppression on and press Privy's own Try again once - the retry re-runs
   init inside the same fund() call, now sees zero saved tokens, and takes
   the working fresh-Link path. DOM-hack like the min-guard: if Privy's
   markup changes, worst case the user clicks Try again / Close themselves
   (the rejection branch below then restarts the checkout). */
function autoTryAgain(){
  if (autoRetries >= 3) return;
  const root = document.querySelector("#privy-modal-content") || document.querySelector('[role="dialog"]') || document;
  const btn = [...root.querySelectorAll("button")].find(b => /^try again$/i.test((b.textContent || "").trim()));
  if (btn){
    autoRetries++;
    console.warn("[buy-diag] auto-retrying via Privy's Try again button (attempt " + autoRetries + ")");
    btn.click();
  }
}
/* Diagnostic tap: Stripe's onramp drives page-side RPC handlers via
   postMessage from its frames; when a run dies, knowing WHICH call was in
   flight is the whole diagnosis. Names only, never payloads (they carry
   session material), capped so a chatty run can't flood the console. */
let rpcLogBudget = 60;
window.addEventListener("message", (e) => {
  try {
    if (rpcLogBudget <= 0 || !/stripe|privy/i.test(String(e.origin))) return;
    const d = e.data;
    const name = d && (d.method || d.action || (d.message && (d.message.method || d.message.action)) || d.type);
    if (typeof name === "string" && name && !/^webpack|^react/i.test(name)){
      rpcLogBudget--;
      console.info("[buy-diag] rpc:", String(name).slice(0, 80), "from", e.origin);
    }
  } catch(_){}
}, true);
const _cerror = console.error.bind(console);
console.error = (...args) => {
  try {
    if (String(args[0]).startsWith("[FiatOnramp:Stripe]")){
      if (linkReauthStarted){
        // ANY provider error after the user just re-authenticated Link =
        // the half-initialized continuation - a clean reload fixes it
        reloadAfterRelink();
      } else if (args.some(a => /not authenticated/i.test(String((a && a.message) || a)))){
        staleLinkSeen = true;
        suppressSavedTokens = true;
        freshCustomerSpoofs = 1;   // re-armed on every recurrence: each retry consumes one
        console.warn("[buy-diag] stale Link session detected - next attempt takes the Link re-auth path");
        errToast("Your saved Link sign-in expired - retrying; Link will ask you to verify your email again.");
        setTimeout(autoTryAgain, 800);
      }
    }
  } catch(_){}
  return _cerror(...args);
};
const _fetch = window.fetch.bind(window);
window.fetch = async (input, init) => {
  const url = String((input && input.url) || input || "");
  if (suppressSavedTokens && /\/onramp\/stripe\/customer\/payment_tokens/.test(url)){
    console.warn("[buy-diag] suppressing saved-payment-tokens fetch (stale-Link recovery)");
    return new Response('{"data":[]}', { status: 200, headers: { "content-type": "application/json" } });
  }
  if (freshCustomerSpoofs > 0 && /\/onramp\/stripe\/customer(\?|$)/.test(url)){
    freshCustomerSpoofs--;
    console.warn("[buy-diag] presenting as fresh crypto customer for this lookup (stale-Link recovery)");
    return new Response('{"data":{"status":"none"}}', { status: 200, headers: { "content-type": "application/json" } });
  }
  if (suppressSavedTokens && /\/onramp\/stripe\/create_link_auth_intent/.test(url)){
    linkReauthStarted = true;   // the user is heading into Link's email/OTP re-auth
  }
  // Stripe's own chunks requested from OUR origin = the blocked-frame fallback
  if (/\/crypto-onramp\/v1\//.test(url) && url.indexOf(location.origin) === 0) blockedFrameHelp();
  const res = await _fetch(input, init);
  try {
    // post-OTP token exchange succeeding = the relink is DONE; reload before
    // the half-initialized continuation can error (the response has landed,
    // so Link's fresh credentials are already persisted)
    if (linkReauthStarted && res.ok && /\/onramp\/stripe\/exchange_tokens/.test(url)){
      reloadAfterRelink();
    }
    if (!res.ok){
      const body = await res.clone().text();
      console.warn("[buy-diag]", res.status, url, body.slice(0, 400));   // EVERY failing call logs
      if (/\/crypto-onramp\/v1\//.test(url) && url.indexOf(location.origin) === 0){ blockedFrameHelp(); }
      else if (/privy\.io|moonpay|stripe|meld|coinbase/i.test(url)){
        // the endpoint IS the diagnosis (which provider, which step) - a
        // screenshot of this toast must be enough to debug from
        let at = ""; try { at = " @ " + new URL(url).pathname.replace(/\/(cae|sess|txn)?[a-z0-9_-]{16,}/gi, "/…"); } catch(_){}
        errToast("Payment error (" + res.status + at + "): " + humanApiError(res.status, body));
      }
    }
  } catch(_){}
  return res;
};
const APP_ID = "cmr8u8m5y00cf0djiqotqm7ag";
const CLIENT_ID = "client-WY6b9c219SjvhdjLGYDriJ9xjSrbV7c4joihKRQPRm3QN";
const USDC_BASE = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
const msg = (html) => { document.getElementById("msg").innerHTML = html; };
try {
  // self-hosted bundle (site/privy/, built by esbuild from @privy-io/react-auth
  // + react) - no CDN at runtime; lazy screens load as local chunks
  const mod = await import("/privy/entry.js");
  const { React, createRoot, PrivyProvider, usePrivy, useFiatOnramp, getAccessToken } = mod;
  const h = React.createElement;

  /* Privy's amount screen doesn't enforce a minimum (a $0 continues to the
     provider, which only rejects a screen later). The modal renders in OUR
     document, so watch its amount input and hold the primary button below
     the floor. While a provider iframe (Stripe card fields) has the screen
     there is no amount input in our DOM and the guard idles. Degrades
     safely: if Privy's DOM changes, worst case is no guard. */
  const MIN_USD = 1;
  function startMinimumGuard(){
    setInterval(() => {
      const amt = [...document.querySelectorAll("input")].find(i =>
        i.inputMode === "decimal" || i.type === "number" ||
        /amount/i.test((i.name || "") + (i.id || "") + (i.placeholder || "") + (i.getAttribute("aria-label") || "")));
      let hint = document.getElementById("minHint");
      if (!amt){ if (hint) hint.remove(); return; }
      const val = parseFloat(String(amt.value).replace(/[^\d.,]/g, "").replace(",", ".")) || 0;
      const ok = val >= MIN_USD;
      [...document.querySelectorAll("button")]
        .filter(b => /^(continue|review|next|buy)\b/i.test((b.textContent || "").trim()))
        .forEach(b => { b.disabled = !ok; b.style.opacity = ok ? "" : ".45"; b.style.pointerEvents = ok ? "" : "none"; });
      if (!ok){
        if (!hint){
          hint = document.createElement("div"); hint.id = "minHint";
          hint.style.cssText = "position:fixed;bottom:8px;left:0;right:0;text-align:center;color:#ffb86b;font:12px/1.4 monospace;z-index:2147483647;pointer-events:none;";
          document.body.appendChild(hint);
        }
        hint.textContent = "Minimum purchase: $" + MIN_USD;
      } else if (hint) hint.remove();
    }, 350);
  }

  function embeddedAddressOf(user){
    const accs = (user && (user.linkedAccounts || user.linked_accounts)) || [];
    const w = accs.find(a => a && a.type === "wallet"
      && ((a.walletClientType || a.wallet_client_type) === "privy")
      && (((a.chainType || a.chain_type) || "ethereum") === "ethereum"));
    return (w && w.address) || null;
  }

  function App(){
    const { ready, authenticated, user } = usePrivy();
    const { fund } = useFiatOnramp();
    const started = React.useRef(false);
    React.useEffect(() => {
      console.info("[buy-diag] privy state: ready=" + ready + " authenticated=" + authenticated);
      if (!ready) return;
      if (!authenticated){
        msg("You’re not signed in.<br/>Close this window, hit <b>Sign in</b> on the main page, then try again.");
        return;
      }
      const address = embeddedAddressOf(user);
      if (!address){
        msg("This sign-in method has no email account wallet.<br/>Card purchase is available for email sign-ins; wallet users can fund directly.");
        return;
      }
      if (started.current) return; started.current = true;
      msg("");
      startMinimumGuard();   // guards the onramp's amount screen
      const finish = () => {
        msg("Done - USDC lands in your account within a few minutes.");
        setTimeout(() => window.close(), 2500);
      };
      /* No auto-close on failure: closing the window destroys the one
         explanation of what went wrong before anyone can read it. */
      const failed = (s) => {
        errToast("Checkout didn’t complete: " + s);
        msg("Checkout didn’t complete. Close this window and try again from the console.");
      };
      const isCancel = (s) => /clos|cancel|exit|abort|dismiss/i.test(s);
      /* Cancel NEVER closes the window. The backdrop heuristics kept losing
         (Privy's [role=dialog] can BE the full-screen wrapper, making backdrop
         clicks land "inside" it), and every miss closed the window mid-focus-
         click. Deterministic instead: a dismissed flow parks on a restart
         screen; only the user (or a finished purchase) closes the window. A
         dismiss within 1.5s of a click we saw hit the backdrop still reopens
         by itself (capped, so nothing can loop). */
      let reopens = 0;
      const accidentalDismiss = () =>
        Date.now() - lastBackdropClick < 1500 && reopens++ < 3;
      const dismissed = (retry) => {
        msg('Checkout closed before finishing.<br/><br/>' +
            '<button id="retryBtn" style="pointer-events:auto;background:#2FE6A8;color:#06281C;border:0;' +
            'border-radius:10px;padding:10px 22px;font:600 14px system-ui,sans-serif;cursor:pointer;">Restart checkout</button>' +
            '<br/><br/><span style="font-size:12px;">…or just close this window.</span>');
        document.getElementById("retryBtn").onclick = () => { msg(""); retry(); };
      };

      /* THE checkout - the fiat onramp - Stripe/Link card + Apple/Google Pay + ACH
         checkout in the US+EU, Privy's provider aggregator elsewhere. USDC on
         Base straight to the embedded wallet. Resolves 'confirmed' (done) or
         'submitted' (user left with the purchase in flight) - both mean money
         is on the way. Rejects on cancel AND on real errors, so triage below. */
      /* Token freshness: the middle of checkout runs entirely in the
         provider's UI, so MINUTES pass with no Privy API call - the final
         submit (POST /api/v1/onramp/stripe/checkout/:id) is often the first
         one in a long while, and a stale or rotated access token surfaces
         there as a 401 "User is not authenticated" with the purchase fully
         entered. (The console shares this session from a DIFFERENT Privy SDK
         - js-sdk-core - so cross-window refresh races are real.) Force a
         fresh token before the flow starts, and nudge it every 2 minutes
         while the window lives; getAccessToken() only hits the network when
         the token is actually near expiry. */
      const freshToken = () => getAccessToken().then(
        (t) => { if (!t) console.warn("[buy-diag] getAccessToken returned null"); return t; },
        (e) => { console.warn("[buy-diag] token refresh failed:", e); return null; }
      );
      setInterval(freshToken, 120000);

      const startCheckout = async () => {
        if (!await freshToken()){
          msg("Your session has expired.<br/>Close this window, sign in again on the main page, then retry.");
          return;
        }
        fund({
          source: { defaultAsset: "usd" },
          defaultAmount: "25",
          // NO environment override: Privy matches the provider environment
          // to the app's provisioning. Forcing "production" can pair a
          // production Stripe controller with a session minted for the other
          // mode - the controller iframe then 403s and the checkout dies at
          // submit with Stripe's "User is not authenticated".
          destination: { asset: USDC_BASE, chain: "eip155:8453", address }
        }).then(
          () => finish(),
          (e) => {
            const s = String(e && (e.message || e));
            console.warn("[buy-diag] fiat onramp rejected:", e);
            if ((staleLinkSeen || /not authenticated/i.test(s)) && !isCancel(s) && !linkAuthRetried){
              linkAuthRetried = true; suppressSavedTokens = true; staleLinkSeen = false;
              freshCustomerSpoofs = 1;
              console.warn("[buy-diag] stale Link session - restarting checkout on the Link re-auth path");
              errToast("Your saved Link session expired - restarting checkout so you can sign in to Link again.");
              startCheckout(); return;
            }
            if (isCancel(s)){
              if (accidentalDismiss()){ console.warn("[buy-diag] dismiss after backdrop click - reopening checkout"); startCheckout(); return; }
              dismissed(startCheckout); return;
            }
            failed(s);
          }
        );
      };
      startCheckout();
    }, [ready, authenticated]);
    return null;
  }

  createRoot(document.getElementById("root")).render(
    h(PrivyProvider, {
      appId: APP_ID,
      clientId: CLIENT_ID,
      config: {
        appearance: { theme: "dark", accentColor: "#2FE6A8" },
        embeddedWallets: { createOnLogin: "off" }
      }
    }, h(App))
  );
} catch (e) {
  msg("Couldn’t load the checkout: <b>" + String(e && (e.message || e)).replace(/</g, "&lt;") + "</b><br/>Check your connection and try again.");
}
</script>
</body>
</html>
