# Tinfoil enclave = ONE persistent NAN supervisor. It IS the api.nan.host service
# (control + data), measured and attested. Per-use sandboxes are spawned by the
# supervisor in-process at runtime — no external tier, no redeploy per use.
#
# This repo BUILDS the image in CI: the `image:` digest below is rewritten by the
# Tinfoil Release workflow on every tagged release. Leave the :placeholder tag —
# do NOT hand-edit the @sha256 part. Just edit env/secrets, commit, and run the
# workflow with a new version.
cvm-version: 0.7.5
cpus: 8           # supervisor + headroom for spawned sandboxes
memory: 65536     # 64 GiB — raise to fit concurrent per-use containers
gpus: 1           # the GPU reserved for the month (the supervisor does not touch it yet — initMig is a stub)

containers:
  - name: "nan"
    # Built + pinned by CI (ghcr.io/stevedefacto/nan, lowercase — see the workflow).
    image: "ghcr.io/stevedefacto/nan@sha256:d2099cd0bd2653857c7c9f367b794a9a323f5a74b15904aaa6f62a4db6bd2b83" # v0.1.2
    env:
      - PORT: "8080"
      # The shim URL Tinfoil assigns this container (or your custom domain once mapped).
      - PUBLIC_URL: "https://nan.<org>.containers.tinfoil.dev"
      - SIWE_DOMAIN: "nan.host"
      - SIWE_URI: "https://nan.host"
      - CHAIN_ID: "8453"
      - CORS_ORIGINS: "https://nan.host"
      - BASE_RPC: "https://mainnet.base.org"
      - ESCROW_ENABLED: "false"
      - SESSION_TTL: "43200"
      - MIG_LAYOUT: "1g.18gb,1g.18gb,1g.18gb,1g.18gb,1g.18gb,1g.18gb,1g.35gb"
      - SSH_USER: "instance"
      - DEFAULT_IMAGE: "debian:bookworm-slim"   # any stock image; sshd is hosted by the supervisor
      # SSH host-key fingerprint is generated at boot in-enclave and measured into an RTMR — not configured here.
    secrets:
      - SECRET            # signs/verifies the session+capability token (add it in Dashboard > Secrets)

# The shim is the single ingress. Control (/v1/*) and data (/x/:id/*) are both
# served by the supervisor on one port — one origin, one cert for the browser.
shim:
  upstream-port: 8080
  paths:
    - /*
