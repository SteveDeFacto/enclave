# NAN enclave - SUBMISSION MODEL (multi-container, all measured & attested).
#
# Three containers share one confidential VM (shared localhost network, shared
# /mnt/ramdisk volume, ipc:host so MPS shared-memory works):
#
#   supervisor   - control plane (auth, billing, quota, routing). No GPU. Public via shim.
#   mps-control  - runs the MPS daemon so per-tenant worker processes get HARDWARE-
#                  enforced SM% + VRAM caps (validated under CC). Owns /tmp/nvidia-mps.
#   worker       - GPU container. Holds the card, forks one MPS-capped CUDA process
#                  per tenant, runs submitted compute. Reached by the supervisor on localhost.
#
# Tenants do NOT bring containers (Tinfoil forbids runtime container creation) - they
# SUBMIT work to the worker. That is the only model the platform allows.
#
# Images are built+pinned by CI; leave the :placeholder tags, the Release workflow
# rewrites the @sha256 digests. Tinfoil REQUIRES a digest on every image to attest it.
cvm-version: 0.7.5
cpus: 16
memory: 65536      # 64 GiB
gpus: 1            # whole H200 attached to the enclave (CC allows 1 or 8)

containers:
  # --- MPS daemon: makes per-tenant SM%/VRAM caps enforceable in prod -----------
  - name: "mps-control"
    image: "ghcr.io/stevedefacto/nan-mps@sha256:64762476d2d9e3af629f43e621ba7327e60166520f1e561f05046a2bf69dd152"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    volumes:
      - /mnt/ramdisk/nvidia-mps:/tmp/nvidia-mps          # shared MPS pipe dir
      - /mnt/ramdisk/nvidia-mps-log:/tmp/nvidia-mps-log
    healthcheck:
      test: ["CMD-SHELL", "echo get_server_list | nvidia-cuda-mps-control >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- GPU worker: forks MPS-capped CUDA processes per tenant, runs submitted jobs
  - name: "worker"
    image: "ghcr.io/stevedefacto/nan-worker@sha256:984678e495d94d65633162d7939341a00c48f346e8ee364b1b79e406be335a2f"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - WORKER_PORT: "8090"
      - CUDA_MPS_PIPE_DIRECTORY: "/tmp/nvidia-mps"
      - GPU_VRAM_GB: "141"
    volumes:
      - /mnt/ramdisk/nvidia-mps:/tmp/nvidia-mps          # join the MPS daemon
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- supervisor: control plane (no GPU), public ingress -----------------------
  - name: "supervisor"
    image: "ghcr.io/stevedefacto/nan@sha256:bf1832369b1c522a1748c34e5450e2bae58d533afb151b6f37738de73c0367db"
    restart: always
    env:
      - PORT: "8080"
      - WORKER_URL: "http://localhost:8090"              # GPU worker (PTX submission backend)
      # CPU docker-container hosting: provision each customer image as a QEMU microVM.
      - PROVISION_BACKEND: "vm"                          # "vm" = CPU container hosting; "worker" = GPU PTX
      - VMMGR_URL: "http://localhost:8091"               # the microVM manager (container below)
      - PUBLIC_URL: ""                                  # empty: supervisor derives its origin per-request from the Host header (handles enclave1..N with one config). Verify the returned network.endpoint on first deploy.
      - SIWE_DOMAIN: "nan.host"
      - SIWE_URI: "https://nan.host"
      - CHAIN_ID: "8453"
      - CORS_ORIGINS: "https://nan.host"
      - BASE_RPC: "https://mainnet.base.org"
      # pay-per-deploy (no custody): supervisor WATCHES this forwarder for payments.
      # FORWARDER_ADDRESS = deployed NanPay contract. USDC funds go straight to the
      # payout wallet set INSIDE that contract (nan.eth's cold wallet) - never here.
      # NOTE: requires outbound egress from the enclave to BASE_RPC. Confirm with Tinfoil.
      - FORWARDER_ADDRESS: "0x149538Ea6ab1E18530B3964c648A2de7b106c561"                            # set after deploying NanPay.sol
      - USDC_ADDRESS: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"   # USDC on Base
      - PAYMENT_WINDOW_SEC: "600"                        # unpaid deployments release the reservation
      - GRACE_SEC: "90"                                  # grace after expiry before teardown (top-up window)
      - PAY_POLL_SEC: "12"
      - SESSION_TTL: "43200"
      - GPU_COUNT: "1"
      - GPU_VRAM_GB: "141"
      - SM_TOTAL: "132"
      - MIN_COMPUTE_PCT: "1"
      - VRAM_GRANULARITY_GB: "1"
      - CTX_OVERHEAD_GB: "0.5"
      # manual-billing / pilot: boot deployments without an on-chain payment.
      # AUTO_PROVISION="1" provisions EVERY deploy for free (use only for a closed
      # pilot). Leave "" and use the ADMIN_TOKEN-gated provision endpoint instead to
      # provision one deployment at a time. AUTO_PROVISION_HOURS=0 means no auto-expiry.
      - AUTO_PROVISION: ""
      - AUTO_PROVISION_HOURS: "0"
    secrets:
      - SECRET
      - ADMIN_TOKEN              # operator token for POST /v1/admin/deployments/:id/provision
    command: ["node", "supervisor.js"]

  # --- wasm manager: tenant apps via `wasmtime serve` --------------------------
  # Nested container runtimes (qemu microVM, then gVisor) are both blocked: the
  # enclave confines this container so it can't create namespaces/mounts or let a
  # runtime fork/exec its helpers, and privileged: true isn't honored (Tinfoil's
  # config has no such field). A Wasm runtime needs NONE of those ops, so it runs
  # inside the confinement as-is. Each tenant app is a `wasmtime serve` subprocess
  # on a private loopback port; isolation = Wasm sandbox + OS process + curated
  # WASI (no fs, no host env, no net beyond the served socket). The supervisor
  # (PROVISION_BACKEND="vm") speaks the SAME /vms contract and proxies /x/:id to
  # the app's loopback port. No privileged, no netns, no cgroups.
  #
  # The app catalog is baked into the image (apps/*.wasm + catalog.json), so what
  # runs is exactly what Tinfoil attested. Apps are wasi:http components.
  - name: "wasm-manager"
    image: "ghcr.io/stevedefacto/nan-wasm-manager@sha256:b5e9779d7a774aa9c8a587fd2def8893f38849a5bbc1f9063105d1d951e1a96a"
    restart: always
    env:
      - WASM_MANAGER_PORT: "8091"   # same port the supervisor's VMMGR_URL already targets
      - NODE_VCPUS: "16"
      - NODE_RAM_GB: "64"
      - WASM_APP_MEM_MB: "512"      # default per-app address-space cap (RLIMIT_AS)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

# Single ingress → supervisor. Only these paths are reachable from outside.
shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/*
    - /availability
    - /x/*
    # microVM deploys need NO new shim path: /v1/vms/* falls under /v1/* (the
    # supervisor proxies it to the wasm-manager on :8091), and a container's server is reached via /x/*.
