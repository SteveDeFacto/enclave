# Enclave enclave - SUBMISSION MODEL (multi-container, all measured & attested).
#
# Four containers share one confidential VM (shared localhost network, shared
# /mnt/ramdisk volume, ipc:host so MPS shared-memory works):
#
#   supervisor   - control plane (auth, billing, quota, routing). No GPU. Public via shim.
#   mps-control  - runs the MPS daemon so per-tenant worker processes get HARDWARE-
#                  enforced SM% + VRAM caps (validated under CC). Owns /tmp/nvidia-mps.
#   worker       - GPU container. Holds the card, forks one MPS-capped CUDA process
#                  per tenant, runs submitted compute. Reached by the supervisor on localhost.
#   wasm-manager - tenant apps as `wasmtime serve` processes (wasi-nn GPU via MPS).
#
# The WHOLE card belongs to tenants: gpuShare is a 1-100% dial and 100% = all
# 141 GB + all SMs (no platform-model sidecar holds a slice on this flavor -
# big models ride the same tenant path as attested GGUF volumes via wasi-nn).
#
# Tenants do NOT bring containers (Tinfoil forbids runtime container creation) - they
# SUBMIT work to the worker. That is the only model the platform allows.
#
# Images are built+pinned by CI; leave the :placeholder tags, the Release workflow
# rewrites the @sha256 digests. Tinfoil REQUIRES a digest on every image to attest it.
cvm-version: 0.7.5
cpus: 16
memory: 65536      # 64 GiB
gpus: 1            # whole H200 attached to the enclave (CC allows 1 or 8)

containers:
  # --- MPS daemon: makes per-tenant SM%/VRAM caps enforceable in prod -----------
  - name: "mps-control"
    image: "ghcr.io/enclavehost/enclave-mps@sha256:e7c28466c299913e4319bb913cd15223fa96b74454de0b7f938283906d648049"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    volumes:
      - /mnt/ramdisk/nvidia-mps:/tmp/nvidia-mps          # shared MPS pipe dir
      - /mnt/ramdisk/nvidia-mps-log:/tmp/nvidia-mps-log
    healthcheck:
      test: ["CMD-SHELL", "echo get_server_list | nvidia-cuda-mps-control >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- GPU worker: forks MPS-capped CUDA processes per tenant, runs submitted jobs
  - name: "worker"
    image: "ghcr.io/enclavehost/enclave-worker@sha256:204f75e3515d1ef4ce45d4e4220deac306fc6133e042792780eee18f3165fa82"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - WORKER_PORT: "8090"
      - CUDA_MPS_PIPE_DIRECTORY: "/tmp/nvidia-mps"
      - GPU_VRAM_GB: "141"          # FALLBACK only: the worker probes the card (nvidia-smi memory.total) at boot
    volumes:
      - /mnt/ramdisk/nvidia-mps:/tmp/nvidia-mps          # join the MPS daemon
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- supervisor: control plane (no GPU), public ingress -----------------------
  - name: "supervisor"
    image: "ghcr.io/enclavehost/enclave-supervisor@sha256:be746ba07c5c941d8b735333ffdf73e721bbea7fbd3c0d8d077662e6659d5cc0"
    restart: always
    env:
      - PORT: "8080"
      - WORKER_URL: "http://localhost:8090"              # GPU worker (PTX submission backend)
      # tenant-app hosting: the wasm-manager runs each app as a `wasmtime serve` process.
      - PROVISION_BACKEND: "vm"                          # "vm" = wasm app hosting (wasm-manager); "worker" = GPU PTX
      - VMMGR_URL: "http://localhost:8091"               # the wasm-manager (container below); "vm"/VMMGR names are legacy
      - PUBLIC_URL: ""                                  # empty: supervisor derives its origin per-request from the Host header (handles enclave1..N with one config). Verify the returned network.endpoint on first deploy.
      - SIWE_DOMAIN: "enclave.host"
      - SIWE_URI: "https://enclave.host"
      - CHAIN_ID: "8453"
      - CORS_ORIGINS: "https://enclave.host"
      - BASE_RPC: "https://mainnet.base.org"
      # pay-per-deploy (no custody): supervisor WATCHES this forwarder for payments.
      # FORWARDER_ADDRESS = deployed EnclavePay contract. USDC funds go straight to the
      # payout wallet set INSIDE that contract (the operator's cold wallet) - never here.
      # NOTE: requires outbound egress from the enclave to BASE_RPC. Confirm with Tinfoil.
      - FORWARDER_ADDRESS: "0x9487322262F4ED763C1a0880ECD5E996094fb81C"                            # set after deploying EnclavePay.sol
      - USDC_ADDRESS: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"   # USDC on Base
      # app approval gate: EnclaveAppCatalog (read-only, written by scripts/deploy-app-catalog.mjs).
      # ipfs:// app deploys are REFUSED unless the catalog owner has Approved that
      # version (setApproval tx signed by the catalog's deployer key). Empty =
      # nothing can deploy (the image ships no deployable apps; the one baked
      # .wasm is the boot probe's fixture, not reachable through the API).
      - APP_CATALOG_ADDRESS: "0x21F2798A51F5970dD43A5D8fAdA48b1b8D59cc67"                          # set after deploying EnclaveAppCatalog.sol (must be on CHAIN_ID's chain, read via BASE_RPC)
      - PAYMENT_WINDOW_SEC: "600"                        # unpaid deployments release the reservation
      - GRACE_SEC: "90"                                  # grace after expiry before teardown (top-up window)
      - PAY_POLL_SEC: "12"
      - SESSION_TTL: "43200"
      # attestation: /v1/attestation relays the shim's Remote Attestation Document
      # (fetched from /.well-known/tinfoil-attestation on loopback; ATTESTATION_URL
      # overrides discovery if the shim binds elsewhere). ENCLAVE_REPO is the repo
      # whose Sigstore-signed release measurements verifiers compare the quote to.
      # MUST match the canonical GitHub casing exactly: Sigstore's policy check
      # compares it verbatim to the cert's GitHubWorkflowRepository claim, and
      # "EnclaveHost/Enclave" vs "EnclaveHost/enclave" fails verification.
      - ENCLAVE_REPO: "EnclaveHost/enclave"
      # on-chain discovery: with these set, the supervisor self-registers this
      # enclave in EnclaveRegistry and heartbeats every 15 min (registerOnChain in
      # supervisor.js), so callers discover enclaves from the chain with no
      # trusted gateway. Non-fatal: if anything here is missing the enclave still
      # serves, it just doesn't advertise. Registration signs on Base mainnet over
      # BASE_RPC and needs the REGISTRY_PRIVATE_KEY secret funded with a little ETH
      # for gas. The advertised URL is NOT configured — it's derived from the
      # hostname callers actually reach (the attested origin), registered lazily on
      # the first external request. (Pin it with PUBLIC_URL only if you must.)
      - REGISTRY_ENABLED: "1"
      - ADDRESS_BOOK_ADDRESS: "0xab214342d5A490150A4A977063A2f88E21F80907"                                                            # set by scripts/deploy-address-book.mjs; "" = baked addresses only; when set the supervisor resolves + polls the contract addresses below from the on-chain EnclaveAddressBook
      - REGISTRY_ADDRESS: "0xCB65f487eba6564D57FfB860cF9aE701584cB4a2"                             # set by scripts/deploy-registry.mjs
      # - REGISTRY_HEARTBEAT_SEC: "900"                  # optional, default 15 min
      # Portable deployments (contracts/DEPLOYMENTS.md): with CLAIM_ENABLED the
      # enclave polls the EnclaveDeployments ledger and claims funded, unleased
      # deployments it can serve — including ones whose previous runner died.
      # Claims sign with REGISTRY_PRIVATE_KEY (the contract gates claims to this
      # registry entry's operator), so registry advertising above is a hard
      # prerequisite, as is PROVISION_BACKEND=vm (claims run catalog wasm apps).
      - CLAIM_ENABLED: "1"
      - DEPLOYMENTS_ADDRESS: "0x267f7F792CA84482698b2f6774B028522247B6CD"                          # set by scripts/deploy-deployments.mjs
      # - CLAIM_POLL_SEC: "60"                           # optional: queue sweep / lease audit cadence
      # - RENEW_MARGIN_SEC: "300"                        # optional: renew when less lease than this remains
      # - CPU_CLAIM_GRACE_SEC: "120"                     # optional: how long CPU-only work waits for a CPU enclave before we bid on it
      - GPU_COUNT: "1"
      - GPU_VRAM_GB: "141"                               # FALLBACK until probed: the supervisor adopts the wasm-manager's nvidia-smi total via /health (this container has no GPU), so a share's VRAM cap tracks the real card
      - GPU_TFLOPS: "989"                                # GPU compute per card (H200 FP16 dense); exact gpuTflops asks divide by this
      - NODE_GFLOPS: "1000"                              # CPU compute per node in GFLOPS (16 vCPU ≈ 1 TFLOPS); exact cpuGflops asks divide by this
      - SM_TOTAL: "132"
      - MIN_COMPUTE_PCT: "1"
      - VRAM_GRANULARITY_GB: "1"
      - CTX_OVERHEAD_GB: "0.5"
      # dedicated per-deployment IPv6: the relay box's routed /64. Each public
      # deployment gets its own IPv6 from this prefix (deterministic from the id);
      # its tcp:N ports are served there by the tcp6-relay and its udp:N ports by
      # the udp-relay - at the real port, no SNI, no remapping. Advertised in the
      # deploy response (network.address/tcp/udp) and /v1/net-map + /v1/udp-map.
      # Empty = dedicated addressing off (ports stay in-enclave-only via /x).
      # DEP_ADDR_PREFIX is the current name; UDP_ADDR_PREFIX is the accepted
      # legacy alias. See relay/README.md.
      - DEP_ADDR_PREFIX: "2a01:4f9:c013:9b52::/64"       # nan-relay's routed /64 (46.62.128.36); MUST match the relay boxes
      # dedicated-IP EGRESS (outbound half): app outbound leaves FROM its own
      # IPv6 via ENCLAVE_EGRESS. EGRESS_RELAY_TOKEN is a shared secret matching the
      # egress-relay box's env — delivered via `secrets:` below (NOT a plaintext
      # env, which would pin it empty and shadow the injected secret). Unset =
      # egress off. See relay/README.md.
      - EGRESS_SOCKS_PORT: "1080"
      # manual-billing / pilot: boot deployments without an on-chain payment.
      # AUTO_PROVISION="1" provisions EVERY deploy for free (use only for a closed
      # pilot). Leave "" and use the ADMIN_TOKEN-gated provision endpoint instead to
      # provision one deployment at a time. AUTO_PROVISION_HOURS=0 means no auto-expiry.
      - AUTO_PROVISION: ""
      - AUTO_PROVISION_HOURS: "0"
      # public-TCP relay support (relay/README.md): the SNI suffix the relay
      # serves (deployments are reached at <dep-id>.tcp.<domain>). Setting it
      # enables /x/:id/tls/:port — at boot the supervisor MINTS the TLS key +
      # self-signed cert for *.<domain> IN-ENCLAVE (initTlsBridge), so the key
      # never exists outside the CVM (no ACME account, no secret store, no
      # operator copy) and the untrusted relay only ever forwards ciphertext.
      # /v1/tls-bridge publishes the cert's fingerprints over the attested
      # origin so clients can pin the relay-path session to the enclave; being
      # plain (measured) config, the domain itself is attested too. Empty =
      # the /tls/ bridge is disabled.
      - TLS_BRIDGE_DOMAIN: "tcp.enclave.host"
      # in-enclave browser TLS for public HTTP apps: ACME (ZeroSSL) certs for
      # <label>.APP_CERT_DOMAIN minted INSIDE the CVM, served through the SNI
      # relay's /x/:id/https passthrough. DNS-01 TXT records publish to the
      # platform DNS daemon (nan-relay box), HMAC'd with SECRET. The feature
      # activates only when the ACME_EAB_* secrets below are ALSO set.
      - APP_CERT_DOMAIN: "app.enclave.host"
      - DNS_API: "http://46.62.128.36:8153"              # dns-relay TXT push API (nan-relay box)
    # fair-billing state (deployments, funded-time balances, payment-scan cursor).
    # Persisting it means a supervisor restart FREEZES every deployment's clock and
    # payment watching resumes where it stopped, instead of forfeiting paid time.
    # NOTE: the ramdisk survives container restarts within one CVM boot, NOT a full
    # CVM relaunch - a relaunch still starts fresh (payments made while fully down
    # are re-scanned only within the persisted cursor's window).
    volumes:
      - /mnt/ramdisk/enclave-state:/var/lib/enclave
    secrets:
      - SECRET
      - ADMIN_TOKEN              # operator token for POST /v1/admin/deployments/:id/provision
      - REGISTRY_PRIVATE_KEY     # EnclaveRegistry operator EOA (owns this enclave's entry, pays heartbeat gas on Base)
      - EGRESS_RELAY_TOKEN       # shared secret with the egress-relay box; same value fleet-wide (like SECRET). Unset = egress off.
      - ACME_EAB_KID             # ZeroSSL External Account Binding pair (ZeroSSL Developer page).
      - ACME_EAB_HMAC            # Fleet-wide like SECRET; unset = in-enclave app TLS stays off.
      # NOTE: the TLS-bridge key/cert are NOT secrets — they are minted
      # in-enclave at boot (see TLS_BRIDGE_DOMAIN above), so nothing outside
      # the CVM ever holds the private key. The ACME certs work the same way -
      # only the EAB account credentials above come from outside.
    command: ["node", "supervisor.js"]

  # --- wasm manager: tenant apps via `wasmtime serve` --------------------------
  # Nested container runtimes (qemu microVM, then gVisor) are both blocked: the
  # enclave confines this container so it can't create namespaces/mounts or let a
  # runtime fork/exec its helpers, and privileged: true isn't honored (Tinfoil's
  # config has no such field). A Wasm runtime needs NONE of those ops, so it runs
  # inside the confinement as-is. Each tenant app is a `wasmtime serve` subprocess
  # on a private loopback port; isolation = Wasm sandbox + OS process + curated
  # WASI (no fs, no host env, no net beyond the served socket). The supervisor
  # (PROVISION_BACKEND="vm") speaks the SAME /vms contract and proxies /x/:id to
  # the app's loopback port. No privileged, no netns, no cgroups.
  #
  # NO deployable apps ship in the image (the one baked .wasm is the boot
  # probe's fixture): tenant apps arrive as ipfs://<cid>, fetched and
  # hash-verified against the CID in-enclave by this manager, gated by the
  # on-chain catalog approval. Apps are wasi:http components.
  # wasi-nn GPU interface: this container holds the card because tenant
  # wasmtime processes ARE the CUDA processes — a deployment that buys a GPU
  # share is launched with `-S nn` and runs ONNX inference through the host's
  # ONNX Runtime CUDA provider. Isolation is the SAME scheme as the worker
  # backend's PTX children: each tenant process joins the mps-control daemon
  # (shared pipe dir + ipc:host) with CUDA_MPS_ACTIVE_THREAD_PERCENTAGE and
  # CUDA_MPS_PINNED_DEVICE_MEM_LIMIT set from its bought share, so SM% and VRAM
  # are hardware-enforced per process. Tenants without a GPU share never get
  # the wasi-nn import at all.
  - name: "wasm-manager"
    image: "ghcr.io/enclavehost/enclave-wasm-manager@sha256:551364b22396ae27dd8a4118b453caa00942bc663af58b576fd0f68f1daceaee"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - WASM_MANAGER_PORT: "8091"   # same port the supervisor's VMMGR_URL already targets
      - NODE_VCPUS: "16"
      - NODE_RAM_GB: "64"
      - NODE_HAS_GPU: "1"           # GPU node: catalog apps with vram_mb > 0 may launch here (CPU flavor sets "0")
      - GPU_VRAM_GB: "141"          # FALLBACK only: the manager probes the card at boot; a tenant's MPS mem limit = gpuShare × the probed total
      - CUDA_MPS_PIPE_DIRECTORY: "/tmp/nvidia-mps"
      # ggml (GGUF) context window for EVERY GPU tenant on this node (the manager
      # inherits this into each -S nn-graph wasmtime process; there is no
      # per-deployment override). 262144 = 256K tokens = Qwen3.5-122B's NATIVE
      # context (max_position_embeddings); going past it needs static YaRN, which
      # Qwen warns degrades shorter requests, so we hold at native. The KV cache
      # is allocated up front for the full window, so it scales with the model -
      # but Qwen3.5 is a HYBRID linear-attention MoE: only 12 of its 48 layers are
      # full-attention (the other 36 carry a constant-size linear/recurrent state
      # that does NOT grow with context). So KV = 12 layers x 2 KV heads x 256
      # head-dim x (K+V) x 2 bytes = 24 KB/token: 256K f16 = ~6.4 GB on top of the
      # ~60 GB weights (~67 GB total), so a 122B deployment MUST buy a >=~50% GPU
      # share or context allocation fails loudly ("n_ctx too large for the share").
      # (The q8_0 KV cache set below halves it to ~3.2 GB, easing the floor to
      # ~48%.) Small models (qwen2.5-0.5b) pay only a few hundred MB. Lower this
      # if the node should not carry the big-context cost by default.
      - ENCLAVE_GGML_N_CTX: "262144"
      # KV-cache quantization (needs the KV-quant wasmtime toolchain - the
      # WASMTIME_IMAGE repinned alongside this commit). q8_0 on BOTH K and V
      # halves the up-front KV the window costs (256K: ~6.4 GB f16 -> ~3.2 GB) at
      # negligible quality cost. A quantized V cache REQUIRES Flash Attention (the
      # backend auto-enables it for a q8 V, but we set it explicitly). FA on this
      # H200 UNDER MPS is the one unvalidated piece: if a 122B ever fails context
      # allocation after this release, fall back to a q8 K-only cache with
      #   ENCLAVE_GGML_KV_CACHE_TYPE_V: "f16"  +  ENCLAVE_GGML_FLASH_ATTN: "auto"
      # (K-quant needs no FA) - a config-only re-measure, no toolchain rebuild.
      - ENCLAVE_GGML_KV_CACHE_TYPE: "q8_0"
      - ENCLAVE_GGML_FLASH_ATTN: "on"
      # each app's memory cap is its deployment's cpuShare × NODE_RAM_GB
      # (>= the mem_mb its specs declare); WASM_APP_MIN_MEM_MB (64) is the floor
      # friendly name -> the model's auto-mount path. Tinfoil mounts each
      # `models:` entry into every container at /tinfoil/mpk/mpk-<root_hash>
      # (NO volumes: bind - the source path doesn't exist on the CVM host).
      # The manager advertises these in /availability; llm-chat loads from
      # /models/<name> inside the guest. An optional third field
      # (name:path:file.gguf) picks WHICH gguf preloads as the wasi-nn graph
      # when the repo ships several quantizations - the manager stages the
      # pick as a symlink dir, so the mpk-<hash> mount name never matters.
      - MODEL_VOLUMES: "qwen2.5-0.5b:/tinfoil/mpk/mpk-e8e9414bf9f999b44ecd86524627b4a912f17a79d7f191280092af3513688da4,qwen2.5-0.5b-gguf:/tinfoil/mpk/mpk-d02f1afc0eee60adc4da2a541c8e095c9cff347b4f3996c2950ff84c676c1c70:qwen2.5-0.5b-instruct-q4_k_m.gguf,qwen3.5-122b-gguf:/tinfoil/mpk/mpk-1cbf0645575029ca49ebd10daaee21fccd6eb66f1d1563b147c647d78e08387c"
    # SECRET doubles as the manager's control-plane token (VMMGR_TOKEN): tenants
    # hold outbound HTTP to loopback, so the control API on :8091 must reject
    # calls that don't carry it (the supervisor sends X-Vmmgr-Token). The tenant
    # data plane (/enc/*) and /health use their own auth / stay open.
    secrets:
      - SECRET
    volumes:
      - /mnt/ramdisk/nvidia-mps:/tmp/nvidia-mps          # join the MPS daemon (SM%/VRAM caps)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

# --- attested model weights (Tinfoil Modelwrap) -----------------------------
# Read-only model volumes; each becomes a dm-verity image whose root hash is
# part of the enclave measurement (the attestation commits to the exact bytes).
# Generate the `mpk` value in the Tinfoil Models tab from the pinned repo, then
# paste the full value here and the mpk-<root_hash> path into MODEL_VOLUMES
# above (Tinfoil auto-mounts each model into every container at
# /tinfoil/mpk/mpk-<root_hash>; do NOT add a volumes: bind for it). Deployments
# attach these by name (via the console volume picker or their configCid JSON
# `volumes` field); the wasm-manager mounts each into the guest at /models/<name>.
models:
  - name: "qwen2.5-0.5b"
    repo: "onnx-community/Qwen2.5-0.5B-Instruct@cc5cc01a65cc3ff17bdb73a7de33d879f62599b0"
    mpk: "e8e9414bf9f999b44ecd86524627b4a912f17a79d7f191280092af3513688da4_6571900928_4f334276-d275-54dc-9abe-d458e80adf97"
  # Official Qwen GGUF repo (the ggml/llama.cpp wasi-nn path). The repo ships
  # NINE quantizations - MODEL_VOLUMES above picks q4_k_m (sha256 74a4da8c...,
  # verified 2026-07-08) as the preloaded graph - and NO tokenizer.json, so
  # llm-chat's catalog reads the tokenizer cross-volume from qwen2.5-0.5b:
  # deployments using this volume should attach BOTH.
  - name: "qwen2.5-0.5b-gguf"
    repo: "Qwen/Qwen2.5-0.5B-Instruct-GGUF@9217f5db79a29953eb74d5343926648285ec7e67"
    mpk: "d02f1afc0eee60adc4da2a541c8e095c9cff347b4f3996c2950ff84c676c1c70_5372555264_5600f8a0-1cd0-5dc9-a32c-7a110e14da28"
  # Qwen3.5-122B-A10B at 4-bit (unsloth UD-IQ4_XS, ~60 GB) for the ggml/llama.cpp
  # wasi-nn path - the big-model tenant option (~45% of an H200's VRAM). The repo
  # ships THREE split GGUF parts (Qwen3.5-122B-A10B-UD-IQ4_XS-0000N-of-00003.gguf)
  # + its own tokenizer.json, flat at the root; the wasm-manager auto-detects the
  # complete split family and stages all parts as ONE nn-graph, so no MODEL_VOLUMES
  # third field is needed. NOTE: loading a split family needs the split-family
  # ggml backend from wasmtime-nn-ggml.patch - rebuild the "Wasmtime Toolchain"
  # and repin WASMTIME_IMAGE in wasm/Dockerfile.wasm (the current 80148c92 pin
  # predates that patch) before a deployment can actually serve this volume.
  - name: "qwen3.5-122b-gguf"
    repo: "EnclaveHost/qwen3.5-122b-gguf@8beb6427d807c9d2cf185ea22c149f8c63668815"
    mpk: "1cbf0645575029ca49ebd10daaee21fccd6eb66f1d1563b147c647d78e08387c_60242325504_b8673ecf-afc3-5051-8093-f2bf785fe93a"

# Single ingress → supervisor. Only these paths are reachable from outside.
shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/*
    - /availability
    - /x/*
    # app deploys need NO new shim path: /v1/vms/* falls under /v1/* (the
    # supervisor proxies it to the wasm-manager on :8091), and the app's server is reached via /x/*.
